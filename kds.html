// short pleasant "ding" (1–3 beeps) — lightweight, no files needed
function ding(times = 1, gapMs = 250) {
  if (!soundEnabled || !audioCtx) return;
  const now = audioCtx.currentTime;
  for (let i = 0; i < times; i++) {
    const start = now + i * (gapMs / 1000);
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(880, start); // A5
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(0.15, start + 0.01);
    o.start(start);
    g.gain.exponentialRampToValueAtTime(0.0001, start + 0.35);
    o.stop(start + 0.4);
  }
}

    // Drinks map to Sup
function inferSection(item) {
  const raw =
    (item.section || item.station || item.category || "")
      .toString()
      .toLowerCase();
  const name = (item.name || "").toLowerCase();

  const drinkKW = [
    "teh","milo","kopi","nescafe","neslo","sirap","limau","joss","extra joss",
    "air panas","air suam","air kosong","bandung","horlicks","coklat","chocolate",
    "3 layer","mocha","drink","ais","o ais","bersusu","lemon","tapai"
  ];

  // map your categories/aliases
  if (raw.startsWith("goreng")) return "goreng";       // matches goreng, goreng2, etc.
  if (raw === "sup") return "sup";
  if (raw === "drink" || raw === "drinking" || raw === "minuman") return "drinks";

  if (name.includes("goreng")) return "goreng";
  if (name.includes("sup")) return "sup";
  if (drinkKW.some(k => name.includes(k))) return "drinks";

  return "sup";
}

function refreshAges() {
  const now = Date.now();
  document.querySelectorAll('.card-order .age').forEach(el => {
    const t = Number(el.dataset.ts);
    if (!t) return;
    const mins = Math.max(0, Math.floor((now - t) / 60000));
    el.textContent = `${mins} min`;
    el.classList.remove('g','y','r');
    el.classList.add(ageClass(mins));
  });
}

    sectionsToReopen.forEach(sec => {
      if (kds[sec]) {
        kds[sec].done = false;
        kds[sec].doneAt = null;
      }
    });

    // ✅ Only mark new (not done) items as false — keep old done ones as true
    items.forEach(it => {
      const sec = inferSection(it);
      if (!sec) return;

      it.kds = it.kds || {};
      if (sectionsToReopen.includes(sec)) {
        // Kalau item memang dah siap, jangan ubah
        if (it.kds[sec] !== true) {
          it.kds[sec] = false;

    const updates = {

      completedAt: null,
      payment: null,
      status: "active",

    };

  section = val;   // "", "sup", "drinks", "goreng"
  [btnAll, btnSup, btnDrinks, btnGoreng].forEach(b => b.classList.remove('active'));
  if (val==="") btnAll.classList.add('active');
  else if (val==="sup") btnSup.classList.add('active');
  else if (val==="drinks") btnDrinks.classList.add('active');
  else if (val==="goreng") btnGoreng.classList.add('active');
  listen();
}

logoutBtn.addEventListener('click', async () => {
  try {
    await signOut(auth);
    window.location.href = "login.html"; // redirect after logout
  } catch (err) {
    console.error("Logout failed:", err);
    alert("Failed to log out: " + err.message);
  }
});


    function setView(val){
      view = val;                 // "active" | "history"
      [btnActive, btnHistory].forEach(b=>b.classList.remove('active'));
      (val==="active" ? btnActive : btnHistory).classList.add('active');
      listen();
    }

    btnAll.addEventListener('click',    ()=>setSection(""));
    btnSup.addEventListener('click',    ()=>setSection("sup"));
    btnGoreng.addEventListener('click', ()=>setSection("goreng"));
    btnActive.addEventListener('click', ()=>setView("active"));
    btnDrinks.addEventListener('click', ()=>setSection("drinks"));
    btnHistory.addEventListener('click',()=>setView("history"));
    datePicker.addEventListener('change', listen);

    // ---- Init ----
async function init() {
  // Tunggu roleReady dulu
  if (!roleReady) {
    console.warn("⏳ Waiting for role assignment...");
    setTimeout(init, 200);
    return;
  }

  const now = new Date();
  datePicker.value = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
    .toISOString()
    .slice(0, 10);

  listen(); // start listener bila role dah confirm
}

  </script>
