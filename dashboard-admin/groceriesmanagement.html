<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Groceries Management — Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background:#f7f9fc; }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:230px; background:linear-gradient(180deg, #2d5016 0%, #3a6319 100%); color:#fff; padding:18px; transition:transform 0.3s ease-in-out; z-index:1000; border-right: 2px solid #4a7c23; }
    .sidebar.closed { transform:translateX(-100%); }
    .sidebar-handle { position:fixed; top:50%; left:230px; transform:translateY(-50%); background:#2d5016; color:#fff; border:none; padding:6px 10px; border-radius:0 6px 6px 0; cursor:pointer; transition:left 0.3s ease-in-out; z-index:1100; }
    .sidebar.closed + .sidebar-handle { left:0; }
    .sidebar a { display:block; color:rgba(255, 255, 255, 0.85); text-decoration:none; padding:10px 12px; border-radius:8px; margin-bottom:6px; }
    .sidebar a.active { background:rgba(245, 197, 24, 0.2); border: 1px solid #F5C518; color:#fff; }
    .sidebar a:hover:not(.active) { background:rgba(255, 255, 255, 0.1); }
    .sidebar .submenu { margin-left:12px; border-left:2px solid rgba(255, 255, 255, 0.3); padding-left:8px; }
    .sidebar .submenu a { font-size:0.9rem; padding:8px 12px; }
    .sidebar .menu-toggle { cursor:pointer; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-radius:8px; margin-bottom:6px; color:rgba(255, 255, 255, 0.85); }
    .sidebar .menu-toggle:hover { background:rgba(255, 255, 255, 0.1); }
    .sidebar .menu-toggle .arrow { transition:transform 0.3s ease; }
    .sidebar .menu-toggle.collapsed .arrow { transform:rotate(-90deg); }
    .content { margin-left:230px; padding:20px; transition:margin-left 0.3s ease-in-out; }
    .content.full { margin-left:0; }
  </style>
  <link rel="stylesheet" href="../css/admin-sidebar.css">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 64 64">
          <path d="M18 8c1.2 0 2.1.9 2.1 2.1v17.4c0 1 .8 1.8 1.8 1.8h1.2V10.1c0-1.2.9-2.1 2.1-2.1s2.1.9 2.1 2.1v19.2h1.2c1 0 1.8-.8 1.8-1.8V10.1c0-1.2.9-2.1 2.1-2.1s2.1.9 2.1 2.1v18.4c0 5.7-3.8 10.5-9 11.9v14.4c0 1.7-1.4 3.2-3.2 3.2s-3.2-1.4-3.2-3.2V40.4c-5.2-1.4-9-6.2-9-11.9V10.1C15.9 8.9 16.8 8 18 8Z"/>
          <path d="M48.3 7.8c-7.2 2.3-11.1 8.5-11.1 16.4v13.6c0 1.8 1.5 3.3 3.3 3.3h4.7v13.7c0 1.7 1.4 3.2 3.2 3.2s3.2-1.4 3.2-3.2V10.1c0-1.6-1.6-2.8-3.3-2.3Z"/>
        </svg>
      </div>
      <div class="brand-text">
        <h4>Bihun Sup Daging<br>Selambak</h4>
        <span class="brand-sub">Staff Portal</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="../admin.html">
        <i class="fas fa-chart-pie"></i>
        <span>Overview</span>
      </a>

      <div class="menu-toggle" id="storeToggle">
        <div>
          <i class="fas fa-store"></i>
          <span>Store Management</span>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="submenu" id="storeSubmenu">
        <a href="tablemanagement.html">
          <i class="fas fa-chair"></i>
          <span>Table Management</span>
        </a>
        <a href="menumanager.html">
          <i class="fas fa-book-open"></i>
          <span>Menu Management</span>
        </a>
        <a href="groceriesmanagement.html" class="active">
          <i class="fas fa-basket-shopping"></i>
          <span>Groceries</span>
        </a>
      </div>

      <div class="menu-toggle" id="staffToggle">
        <div>
          <i class="fas fa-users"></i>
          <span>Staff Management</span>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="submenu" id="staffSubmenu">
        <a href="staffmanagement.html">
          <i class="fas fa-id-card"></i>
          <span>Staff Directory</span>
        </a>
        <a href="staffattendance.html">
          <i class="fas fa-clock"></i>
          <span>Attendance</span>
        </a>
        <a href="staffpayroll.html">
          <i class="fas fa-money-bill-wave"></i>
          <span>Payroll</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-details">
          <div class="name" id="whoami">Loading...</div>
          <div class="role">Admin</div>
        </div>
      </div>
      <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
      </button>
    </div>
  </div>

  <button id="sidebarHandle" class="sidebar-handle"><i class="fas fa-chevron-left"></i></button>

  <div class="content">
    <h3>Groceries Management</h3>
    <p class="text-muted">This is where groceries management features will go.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { firebaseConfig, RESTAURANT_ID } from "../js/firebase-config.esm.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "../index.html";
        return;
      }
      document.getElementById('whoami').textContent = user.email || user.uid;
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = "../index.html";
    });

    // ✅ Sidebar toggle
    const sidebar = document.getElementById('sidebar');
    const sidebarHandle = document.getElementById('sidebarHandle');
    const content = document.querySelector('.content');

    sidebarHandle?.addEventListener('click', () => {
      sidebar.classList.toggle('closed');
      content.classList.toggle('full');
      const icon = sidebarHandle.querySelector('i');
      icon.className = sidebar.classList.contains('closed') ? 'fas fa-chevron-right' : 'fas fa-chevron-left';
    });

    // ✅ Store Management submenu toggle
    const storeToggle = document.getElementById('storeToggle');
    const storeSubmenu = document.getElementById('storeSubmenu');
    
    if (storeToggle && storeSubmenu) {
      storeToggle.addEventListener('click', () => {
        storeToggle.classList.toggle('collapsed');
        if (storeSubmenu.style.display === 'none') {
          storeSubmenu.style.display = 'block';
        } else {
          storeSubmenu.style.display = 'none';
        }
      });
    }

    const staffToggle = document.getElementById('staffToggle');
    const staffSubmenu = document.getElementById('staffSubmenu');

    if (staffToggle && staffSubmenu) {
      staffToggle.addEventListener('click', () => {
        staffToggle.classList.toggle('collapsed');
        staffSubmenu.style.display = staffSubmenu.style.display === 'none' ? 'block' : 'none';
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
