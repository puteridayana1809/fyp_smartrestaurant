<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Table Management — Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-yellow: #F5C518;
      --primary-dark: #2d5016;
      --primary-green: #4a7c23;
      --sidebar-bg: linear-gradient(180deg, #2d5016 0%, #3a6319 100%);
      --card-shadow: 0 4px 20px rgba(0,0,0,0.06);
      --accent-green: #22c55e;
      --accent-red: #ef4444;
    }
    
    * { box-sizing: border-box; }
    
    body {
      background: #f8f9fc;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 2px solid #4a7c23;
      padding: 20px;
      transition: transform 0.3s ease-in-out;
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 12px;
      margin-bottom: 24px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #2d5016 0%, #4a7c23 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--primary-yellow);
    }

    .brand-logo i {
      color: var(--primary-yellow);
      font-size: 24px;
    }

    .brand-text h4 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }

    .brand-text .brand-tag {
      display: inline-block;
      background: var(--primary-yellow);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .sidebar-handle {
      position: fixed;
      top: 50%;
      left: 260px;
      transform: translateY(-50%);
      background: var(--primary-dark);
      color: #fff;
      border: none;
      padding: 12px 8px;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      transition: left 0.3s ease-in-out;
      z-index: 1100;
    }

    .sidebar-nav {
      flex: 1;
    }

    .sidebar a, .sidebar .menu-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.85) !important;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 4px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .sidebar a i, .sidebar .menu-toggle i {
      width: 20px;
      text-align: center;
      font-size: 1rem;
    }

    .sidebar a.active {
      background: rgba(245, 197, 24, 0.2);
      color: #fff !important;
      border: 1px solid var(--primary-yellow);
    }

    .sidebar a.active i {
      color: var(--primary-yellow);
    }

    .sidebar a:hover:not(.active) {
      background: rgba(255, 255, 255, 0.1);
      color: #fff !important;
    }

    .sidebar .menu-toggle {
      cursor: pointer;
      justify-content: space-between;
    }

    .sidebar .menu-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .sidebar .menu-toggle .arrow {
      transition: transform 0.3s ease;
      font-size: 0.7rem;
    }

    .sidebar .menu-toggle.collapsed .arrow {
      transform: rotate(-90deg);
    }

    .sidebar .submenu {
      margin-left: 20px;
      padding-left: 12px;
      border-left: 2px solid rgba(255, 255, 255, 0.3);
    }

    .sidebar .submenu a {
      font-size: 0.9rem;
      padding: 10px 14px;
    }

    .sidebar-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 16px;
      margin-top: auto;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 42px;
      height: 42px;
      background: var(--primary-yellow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #1a1a1a;
    }

    .user-details {
      flex: 1;
    }

    .user-details .name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #ffffff;
    }

    .user-details .role {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .sidebar.closed {
      transform: translateX(-100%);
    }
    .sidebar.closed ~ .sidebar-handle {
      left: 0;
    }

    /* MAIN CONTENT */
    .content {
      margin-left: 260px;
      padding: 24px 32px;
      transition: margin-left 0.3s ease-in-out;
      min-height: 100vh;
    }

    .content.full {
      margin-left: 0;
    }

    /* PAGE HEADER */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .page-header h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .page-header .breadcrumb {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 4px;
    }

    /* CARDS */
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      background: white;
    }

    .card-header-custom {
      background: var(--primary-dark);
      color: white;
      padding: 16px 20px;
      border-radius: 16px 16px 0 0;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header-custom i {
      color: var(--primary-yellow);
    }

    .card-body-custom {
      padding: 20px;
    }

    /* FORM STYLES */
    .form-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #555;
    }

    .form-control, .form-select {
      border-radius: 10px;
      border: 1px solid #e0e0e0;
      padding: 10px 14px;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--primary-green);
      box-shadow: 0 0 0 3px rgba(74, 124, 35, 0.15);
    }

    /* BUTTONS */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-green) 100%);
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-green) 0%, var(--primary-dark) 100%);
    }

    .table-name {
      color: var(--primary-green);
    }

    /* TABLE */
    .table {
      margin-bottom: 0;
    }

    .table th {
      background: #f8f9fc;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #666;
      border: none;
      padding: 12px;
    }

    .table td {
      padding: 12px;
      vertical-align: middle;
      border-bottom: 1px solid #f0f0f0;
    }

    .badge {
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 6px;
    }

    .btn-danger {
      background: var(--accent-red);
      border: none;
      border-radius: 8px;
    }

    @media (max-width: 992px) {
      .content { margin-left: 0; padding: 16px; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-handle { left: 0; }
    }
  </style>
  <link rel="stylesheet" href="../css/admin-sidebar.css">
</head>
<body>
<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo" aria-hidden="true">
      <svg viewBox="0 0 64 64">
        <path d="M18 8c1.2 0 2.1.9 2.1 2.1v17.4c0 1 .8 1.8 1.8 1.8h1.2V10.1c0-1.2.9-2.1 2.1-2.1s2.1.9 2.1 2.1v19.2h1.2c1 0 1.8-.8 1.8-1.8V10.1c0-1.2.9-2.1 2.1-2.1s2.1.9 2.1 2.1v18.4c0 5.7-3.8 10.5-9 11.9v14.4c0 1.7-1.4 3.2-3.2 3.2s-3.2-1.4-3.2-3.2V40.4c-5.2-1.4-9-6.2-9-11.9V10.1C15.9 8.9 16.8 8 18 8Z"/>
        <path d="M48.3 7.8c-7.2 2.3-11.1 8.5-11.1 16.4v13.6c0 1.8 1.5 3.3 3.3 3.3h4.7v13.7c0 1.7 1.4 3.2 3.2 3.2s3.2-1.4 3.2-3.2V10.1c0-1.6-1.6-2.8-3.3-2.3Z"/>
      </svg>
    </div>
    <div class="brand-text">
      <h4>Bihun Sup Daging<br>Selambak</h4>
      <span class="brand-sub">Staff Portal</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a href="../admin.html">
      <i class="fas fa-chart-pie"></i>
      <span>Overview</span>
    </a>
    <div class="menu-toggle" id="storeToggle">
      <div style="display:flex;align-items:center;gap:12px;">
        <i class="fas fa-store"></i>
        <span>Store Management</span>
      </div>
      <span class="arrow">▼</span>
    </div>
    <div class="submenu" id="storeSubmenu">
      <a href="tablemanagement.html" class="active">
        <i class="fas fa-chair"></i>
        Table Management
      </a>
      <a href="menumanager.html">
        <i class="fas fa-book-open"></i>
        Menu Management
      </a>
    </div>
    
    <div class="menu-toggle" id="staffToggle">
      <div style="display:flex;align-items:center;gap:12px;">
        <i class="fas fa-users"></i>
        <span>Staff Management</span>
      </div>
      <span class="arrow">▼</span>
    </div>
    <div class="submenu" id="staffSubmenu" style="display:none">
      <a href="staffmanagement.html">
        <i class="fas fa-id-card"></i>
        Staff Directory
      </a>
      <a href="staffattendance.html">
        <i class="fas fa-clock"></i>
        Attendance
      </a>
      <a href="staffpayroll.html">
        <i class="fas fa-money-bill-wave"></i>
        Payroll
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">A</div>
      <div class="user-details">
        <div class="name" id="whoami">Loading...</div>
        <div class="role">Admin</div>
      </div>
    </div>
    <button id="logoutBtn" class="btn btn-danger btn-sm w-100">
      <i class="fas fa-sign-out-alt me-2"></i>Logout
    </button>
  </div>
</div>

<button id="sidebarHandle" class="sidebar-handle"><i class="fas fa-chevron-left"></i></button>

<!-- MAIN CONTENT -->
<div class="content">
  <div class="page-header">
    <div>
      <div class="breadcrumb">Seating & Bungkus</div>
      <h2>Control tables and bungkus slots</h2>
    </div>
    <button id="reloadSeatingBtn" class="btn btn-outline-secondary btn-sm">
      <i class="fas fa-sync-alt me-1"></i> Refresh
    </button>
  </div>

  <div class="row g-4">
    <!-- Quick Sync -->
    <div class="col-12 col-lg-5">
      <div class="card">
        <div class="card-header-custom">
          <i class="fas fa-sync"></i> Quick sync
        </div>
        <div class="card-body-custom">
          <div class="mb-3">
            <label class="form-label">Total tables (T1…TN)</label>
            <input id="tblCount" type="number" min="0" value="16" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label">Total bungkus (B1…BM)</label>
            <input id="bksCount" type="number" min="0" value="3" class="form-control" />
          </div>
          <div class="form-check mb-3">
            <input id="allowDeleteExtra" class="form-check-input" type="checkbox">
            <label class="form-check-label" for="allowDeleteExtra">
              Remove extra items not in range <span class="text-muted">(only if no active order)</span>
            </label>
          </div>
          <button id="syncBtn" class="btn btn-primary w-100">
            <i class="fas fa-sync-alt me-2"></i> Sync Now
          </button>
        </div>
      </div>
    </div>

    <!-- Current Tables -->
    <div class="col-12 col-lg-7">
      <div class="card">
        <div class="card-header-custom">
          <i class="fas fa-list"></i> Current
        </div>
        <div class="card-body-custom p-0">
          <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
            <table class="table table-hover mb-0">
              <thead style="position: sticky; top: 0; z-index: 1;">
                <tr>
                  <th>Type</th>
                  <th>Name</th>
                  <th>#</th>
                  <th>Status</th>
                  <th>Active Order</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="seatingList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { firebaseConfig, RESTAURANT_ID } from "../js/firebase-config.esm.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const rdoc = (path, docId) => doc(db, `restaurants/${RESTAURANT_ID}/${path}/${docId}`);
  const rcol = (path) => collection(db, `restaurants/${RESTAURANT_ID}/${path}`);

  // Sidebar toggle
  const sidebar = document.getElementById('sidebar');
  const sidebarHandle = document.getElementById('sidebarHandle');
  const content = document.querySelector('.content');

  sidebarHandle?.addEventListener('click', () => {
    sidebar.classList.toggle('closed');
    content.classList.toggle('full');
    const icon = sidebarHandle.querySelector('i');
    icon.className = sidebar.classList.contains('closed') ? 'fas fa-chevron-right' : 'fas fa-chevron-left';
  });

  // Store submenu toggle
  const storeToggle = document.getElementById('storeToggle');
  const storeSubmenu = document.getElementById('storeSubmenu');
  storeToggle?.addEventListener('click', () => {
    storeToggle.classList.toggle('collapsed');
    storeSubmenu.style.display = storeSubmenu.style.display === 'none' ? 'block' : 'none';
  });

  // Staff submenu toggle
  const staffToggle = document.getElementById('staffToggle');
  const staffSubmenu = document.getElementById('staffSubmenu');
  staffToggle?.addEventListener('click', () => {
    staffToggle.classList.toggle('collapsed');
    staffSubmenu.style.display = staffSubmenu.style.display === 'none' ? 'block' : 'none';
  });

  // Auth
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "../index.html"; return; }
    document.getElementById('whoami').textContent = user.email || "—";
    document.getElementById('userAvatar').textContent = (user.email || "A")[0].toUpperCase();
    loadSeating();
  });

  // Logout
  document.getElementById('logoutBtn')?.addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = "../index.html";
  });

  // Load tables
  async function loadSeating() {
    const tbody = document.getElementById('seatingList');
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><i class="fas fa-spinner fa-spin me-2"></i>Loading...</td></tr>';
    
    const snap = await getDocs(rcol("tables"));
    const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    arr.sort((a, b) => {
      if (a.type !== b.type) return a.type === 'bungkus' ? -1 : 1;
      return (a.number || 0) - (b.number || 0);
    });
    
    tbody.innerHTML = '';
    
    if (arr.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No tables found</td></tr>';
      return;
    }
    
    arr.forEach(item => {
      const tr = document.createElement('tr');
      const statusBadge = item.status === 'available' 
        ? '<span class="badge bg-success">available</span>' 
        : '<span class="badge bg-warning text-dark">occupied</span>';
      
      tr.innerHTML = `
        <td>${item.type || 'table'}</td>
        <td><strong class="table-name">${item.name || ''}</strong></td>
        <td>${item.number || '-'}</td>
        <td>${statusBadge}</td>
        <td>${item.activeOrderId || '-'}</td>
        <td>
          <button class="btn btn-sm btn-danger delete-btn" data-id="${item.id}" data-has-order="${!!item.activeOrderId}">
            Delete
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });

    // Delete handlers
    tbody.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.id;
        const hasOrder = btn.dataset.hasOrder === 'true';
        
        if (hasOrder) {
          alert('Cannot delete: This table has an active order!');
          return;
        }
        
        if (!confirm(`Delete ${id}?`)) return;
        
        try {
          await deleteDoc(rdoc("tables", id));
          loadSeating();
        } catch (e) {
          alert('Delete failed: ' + e.message);
        }
      });
    });
  }

  document.getElementById('reloadSeatingBtn')?.addEventListener('click', loadSeating);

  document.getElementById('syncBtn')?.addEventListener('click', async () => {
    const btn = document.getElementById('syncBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Syncing...';
    
    try {
      const tblCount = parseInt(document.getElementById('tblCount').value, 10) || 0;
      const bksCount = parseInt(document.getElementById('bksCount').value, 10) || 0;
      const allowDelete = document.getElementById('allowDeleteExtra').checked;

      const snap = await getDocs(rcol("tables"));
      const existing = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Tables
      for (let i = 1; i <= tblCount; i++) {
        const docId = `T${i}`;
        const found = existing.find(x => x.id === docId);
        if (!found) {
          await setDoc(rdoc("tables", docId), {
            type: "table",
            name: `T${i}`,
            number: i,
            status: "available",
            activeOrderId: null,
            updatedAt: serverTimestamp()
          });
        }
      }

      // Bungkus
      for (let i = 1; i <= bksCount; i++) {
        const docId = `B${i}`;
        const found = existing.find(x => x.id === docId);
        if (!found) {
          await setDoc(rdoc("tables", docId), {
            type: "bungkus",
            name: `B${i}`,
            number: null,
            status: "available",
            activeOrderId: null,
            updatedAt: serverTimestamp()
          });
        }
      }

      // Delete extra if allowed
      if (allowDelete) {
        const wantedIds = new Set();
        for (let i = 1; i <= tblCount; i++) wantedIds.add(`T${i}`);
        for (let i = 1; i <= bksCount; i++) wantedIds.add(`B${i}`);
        
        for (const ex of existing) {
          if (!wantedIds.has(ex.id) && !ex.activeOrderId) {
            await deleteDoc(rdoc("tables", ex.id));
          }
        }
      }

      alert('✓ Sync complete!');
      loadSeating();
    } catch (e) {
      alert('Sync failed: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sync-alt me-2"></i> Sync Now';
    }
  });
</script>
</body>
</html>
