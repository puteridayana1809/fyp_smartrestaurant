<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Staff Management — Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background:#f7f9fc; }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:230px; background:#212529; color:#fff; padding:18px; transition:transform 0.3s ease-in-out; z-index:1000; }
    .sidebar.closed { transform:translateX(-100%); }
    .sidebar-handle { position:fixed; top:50%; left:230px; transform:translateY(-50%); background:#212529; color:#fff; border:none; padding:6px 10px; border-radius:0 6px 6px 0; cursor:pointer; transition:left 0.3s ease-in-out; z-index:1100; }
    .sidebar.closed + .sidebar-handle { left:0; }
    .sidebar a { display:block; color:#fff; text-decoration:none; padding:10px 12px; border-radius:8px; margin-bottom:6px; }
    .sidebar a.active, .sidebar a:hover { background:#343a40; }
    .sidebar .submenu { margin-left:12px; border-left:2px solid #495057; padding-left:8px; }
    .sidebar .submenu a { font-size:0.9rem; padding:8px 12px; }
    .sidebar .menu-toggle { cursor:pointer; display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-radius:8px; margin-bottom:6px; color:#fff; }
    .sidebar .menu-toggle:hover { background:#343a40; }
    .sidebar .menu-toggle .arrow { transition:transform 0.3s ease; }
    .sidebar .menu-toggle.collapsed .arrow { transform:rotate(-90deg); }
    .content { margin-left:230px; padding:20px; transition:margin-left 0.3s ease-in-out; }
    .content.full { margin-left:0; }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="d-flex align-items-center gap-2 mb-3">
      <h5 class="m-0">Admin</h5>
    </div>
    <a href="../admin.html">Dashboard</a>
    <div class="menu-toggle" id="storeToggle">
      <span>Store Management</span>
      <span class="arrow">▼</span>
    </div>
    <div class="submenu" id="storeSubmenu">
      <a href="tablemanagement.html">Table Management</a>
      <a href="menumanager.html">Menu Management</a>
    </div>
    <a href="staffmanagement.html" class="active">Staff Management</a>
    <a href="groceriesmanagement.html">Groceries Management</a>
    <hr class="border-secondary">
    <div class="small text-secondary">Signed in as</div>
    <div id="whoami" class="small">—</div>
    <button id="logoutBtn" class="btn btn-outline-light btn-sm mt-3 w-100">Logout</button>
  </div>

  <button id="sidebarHandle" class="sidebar-handle">&lt;</button>

  <div class="content">
    <h3>Staff Management</h3>
    <p class="text-muted">This is where staff features will go.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { firebaseConfig, RESTAURANT_ID } from "../js/firebase-config.esm.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const whoami = document.getElementById('whoami');
    const logoutBtn = document.getElementById('logoutBtn');

async function initAuth() {
  try {
    await setPersistence(auth, browserLocalPersistence);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        console.warn("⚠️ No user yet, waiting...");
        setTimeout(() => {
          if (!auth.currentUser) {
            console.warn("❌ Still no user, redirecting.");
            window.location.href = "../index.html";
          }
        }, 1000);
        return;
      }

      whoami.textContent = user.email || user.uid;
      console.log("✅ Logged in:", user.email);

      try {
        const roleSnap = await getDoc(doc(db, "roles", user.uid));
        if (roleSnap.exists()) {
          console.log("✅ Role found:", roleSnap.data().role);
        } else {
          console.warn("⚠️ Role document not found in Firestore for", user.uid);
          console.log("📝 Tip: Add a 'roles' collection in Firestore with this UID as document ID");
        }
      } catch (err) {
        console.error("Role check failed:", err);
      }
    });
  } catch (err) {
    console.error("🔥 setPersistence failed:", err);
  }
}
initAuth();


    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = "../index.html";
    });

    const sidebar = document.getElementById('sidebar');
    const sidebarHandle = document.getElementById('sidebarHandle');
    const content = document.querySelector('.content');
    sidebarHandle.addEventListener('click', () => {
      sidebar.classList.toggle('closed');
      content.classList.toggle('full');
      sidebarHandle.textContent = sidebar.classList.contains('closed') ? '❯' : '❮';
    });

    // ✅ Store Management submenu toggle
    const storeToggle = document.getElementById('storeToggle');
    const storeSubmenu = document.getElementById('storeSubmenu');
    
    if (storeToggle && storeSubmenu) {
      storeToggle.addEventListener('click', () => {
        storeToggle.classList.toggle('collapsed');
        if (storeSubmenu.style.display === 'none') {
          storeSubmenu.style.display = 'block';
        } else {
          storeSubmenu.style.display = 'none';
        }
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
