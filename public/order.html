<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc,setDoc, collection, addDoc, serverTimestamp,
    query, orderBy, onSnapshot, updateDoc,runTransaction
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import { firebaseConfig, RESTAURANT_ID as restaurantId } from "./js/firebase-config.esm.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Expose for non-module script below (cart + submit still use these)
    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
    window.serverTimestamp = serverTimestamp;
    window.getDoc = getDoc;
    window.setDoc = setDoc;
    window.doc = doc;
    window.updateDoc = updateDoc;
    window.runTransaction=runTransaction;
    window.restaurantId = restaurantId;

    window.selectedTableId = null;       
    window.selectedTableNumber = null;
    // keep this near your globals
    window.selectedTable = null;



    function goLogin(msg) {
      if (msg) alert(msg);
      window.location.href = "index.html";
    }



    // ✅ Auth + Role guard: only allow "waiter"
    onAuthStateChanged(auth, async (user) => {
      if (!user) return goLogin("Please sign in first.");

      try {
        const snap = await getDoc(doc(db, "roles", user.uid));
        if (!snap.exists()) {
          await signOut(auth);
          return goLogin("No role assigned. Ask admin to set your role.");
        }
        const role = String(snap.data().role || "").toLowerCase();
        if (role !== "waiter") {
          await signOut(auth);
          return goLogin("Access denied. This page is for WAITERS only.");
        }
        // Waiter verified — page can continue normally
      } catch (e) {
        console.error("Role check failed:", e);
        await signOut(auth);
        goLogin("Error verifying role: " + (e.code || e.message));
      }
    });

    // 🔴 Logout
    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "index.html";
      } catch (err) {
        alert("Error logging out: " + err.message);
      }
    });

   window.addEventListener("DOMContentLoaded", () => {
    // ===== TABLES =====
    const tableContainer = document.getElementById("tableButtons");
    if (!tableContainer) return console.error("❌ #tableButtons not found in DOM");

// add near top
let selectedTableId = null;        // Firestore doc id
let selectedTableNumber = null;    // display number

function isBungkusDoc(t){
  return t?.type === 'bungkus'
      || /^bungkus[- ]?\d+$/i.test(String(t?.id || ''))
      || /^B\d+$/i.test(String(t?.name || ''));
}

function sortTablesNatural(list){
  function key(t){
    if (isBungkusDoc(t)) return [0, 0, (t.name||t.id||'').toUpperCase()];
    // T1..Tn, then plain numbers, then others
    const label = String(t.name || (t.number!=null?`T${t.number}`:''));
    const mT = /^T(\d+)$/i.exec(label);
    const mN = /^(\d+)$/.exec(label);
    if (mT) return [1, parseInt(mT[1],10), label.toUpperCase()];
    if (mN) return [2, parseInt(mN[1],10), label.toUpperCase()];
    return [3, 0, label.toUpperCase()];
  }
  return [...list].sort((a,b)=>{const A=key(a),B=key(b);return A[0]-B[0]||A[1]-B[1]||A[2].localeCompare(B[2]);});
}



function renderTables(tables) {
  tableContainer.innerHTML = "";

// Get everything Admin configured in /tables and render in one pass
const all = sortTablesNatural(tables);

all.forEach((t, i) => {
 const hasOrder = !!t.activeOrderId;           // red if ANY active ticket, green otherwise

const btn = document.createElement('button');
btn.className = 'btn ' + (hasOrder ? 'btn-danger' : 'btn-success');


const isB = (t.type === 'bungkus')
         || /^B(ungkus)?\s*\d+$/i.test(String(t.name || ''))
         || /^B\d+$/i.test(String(t.id || '')); 

  // label fallbacks:
const label = t.name || (isB ? (t.name || String(t.id)) : (t.number != null ? `T${t.number}` : String(t.id)));


  btn.textContent = label;

btn.onclick = () => {
  document.querySelectorAll('#tableButtons button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  window.selectedTable       = t;
  window.selectedTableId     = t.id;
  window.selectedTableNumber = isB ? null : t.number;
  window.selectedTableLabel  = label;

  document.getElementById('tableNumber').value = isB ? label : (t.number ?? '');
  
  // Update selected table label in header
  const labelEl = document.getElementById('selectedTableLabel');
  if (labelEl) labelEl.innerText = `— ${label}`;
  
  // Collapse table section
  const content = document.getElementById('tableSectionContent');
  const toggle = document.querySelector('.section-toggle');
  if (content && toggle) {
    content.classList.add('collapsed');
    toggle.classList.add('collapsed');
  }
  
  // Auto scroll to menu section
  setTimeout(() => {
    const menuSection = document.querySelector('.menu-section');
    if (menuSection) {
      menuSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 100);
};

  tableContainer.appendChild(btn);
});



}




    const tablesQ = query(collection(db, `restaurants/${restaurantId}/tables`), orderBy("number"));
    onSnapshot(
      tablesQ,
      snap => {
        console.log("📥 tables docs:", snap.size);
        const tables = snap.docs.map(d => ({ id:d.id, ...d.data() }));
        renderTables(tables);
      },
      err => {
        console.error("❌ tables onSnapshot error:", err);
        alert("Tables read error: " + err.code);
      }
    );





    // ===== MENU =====
    const menuContainer = document.getElementById("menuContainer");
    if (!menuContainer) return console.error("❌ #menuContainer not found in DOM");

    const categoryFiltersDiv = document.getElementById("categoryFilters");
    let currentCategoryFilter = 'sup'; // Default to sup
    let allCategories = [];
    let allMenuItems = [];

    function formatRM(v){ return v==null ? "-" : "RM " + Number(v).toFixed(2); }

    // Render category filter buttons - show ALL categories from database
    function renderCategoryFilters(categories) {
      if (!categories || categories.length === 0) return;
      
      console.log("🔍 All categories from Firebase:", categories);
      
      const categoryIcons = {
        'minuman': 'fa-glass-water',
        'goreng': 'fa-fire-burner',
        'sup': 'fa-bowl-food'
      };

      const categoryNames = {
        'minuman': 'Minuman',
        'goreng': 'Goreng',
        'sup': 'Sup'
      };

      // Always show these 3 buttons in order
      const orderedCats = ['sup', 'goreng', 'minuman'];
      let html = '';

      orderedCats.forEach(catId => {
        const icon = categoryIcons[catId] || 'fa-utensils';
        const name = categoryNames[catId] || catId;
        
        html += `<button class="cat-filter-btn ${currentCategoryFilter === catId ? 'active' : ''}" data-category="${catId}">
          <i class="fas ${icon}"></i> ${name}
        </button>`;
      });

      categoryFiltersDiv.innerHTML = html;

      // Add click handlers
      categoryFiltersDiv.querySelectorAll('.cat-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentCategoryFilter = btn.dataset.category;
          categoryFiltersDiv.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderFilteredMenu();
        });
      });
    }

    // Render filtered menu based on selected category
    function renderFilteredMenu() {
      if (!allCategories.length || !currentCategoryFilter) return;
      
      const filteredCategories = allCategories.filter(c => c.categoryId === currentCategoryFilter);
      const filteredItems = allMenuItems.filter(it => it.categoryId === currentCategoryFilter);
      renderMenuByCategory(filteredCategories, filteredItems);
    }

    function renderMenuByCategory(categories, items) {
      console.log("📊 rendering | cats:", categories.length, "items:", items.length);
      menuContainer.innerHTML = "";
      const catMap = new Map(categories.map(c => [c.categoryId, c]));
      const grouped = {};
      items.forEach(it => { (grouped[it.categoryId] ||= []).push(it); });

      Object.keys(grouped)
        .sort((a,b) => (catMap.get(a)?.sort||99)-(catMap.get(b)?.sort||99))
        .forEach(cid => {
          const cat = catMap.get(cid);
          const title = cat?.name || cid;
          const accId = `acc_${cid}`;
          const bodyId = `body_${cid}`;

          const section = document.createElement("div");
          section.className = "accordion-item";
          section.id = accId;
          // Auto-expand accordion when showing specific category
          section.innerHTML = `
            <div>
              <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#${bodyId}">${title}</button>
              <div id="${bodyId}" class="accordion-collapse collapse show">
                <div class="accordion-body">
                  <div class="menu-grid"></div>
                </div>
              </div>
            </div>`;
          const gridBody = section.querySelector(".menu-grid");

          (grouped[cid] || [])
            .sort((x,y)=> String(x.name).localeCompare(String(y.name)))
            .forEach(it => {
              const card = document.createElement("div");
              card.className = "menu-item";
              const price = formatRM(it.price);
              const isAvailable = it.isAvailable !== false;

              // Build image HTML
              let imageHTML = '';
              if (it.imageUrl) {
                imageHTML = `<img src="${it.imageUrl}" alt="${it.name}" class="menu-item-image" />`;
              } else {
                imageHTML = `<div class="menu-item-no-image">🍜</div>`;
              }

              card.innerHTML = `
                ${imageHTML}
                <div class="menu-item-details">
                  <div class="menu-item-name">${it.name}</div>
                  <div class="menu-item-price">${price}</div>
                  ${!isAvailable ? '<div style="color:#dc3545; font-size:0.85rem; margin-top:0.5rem; font-weight:600;">Habis</div>' : ''}
                </div>
              `;

              if (isAvailable) {
                card.style.cursor = 'pointer';
                card.onclick = () => {
                  window.addItem(it.name, it.price ?? 0);
                };
              } else {
                card.style.opacity = '0.6';
                card.style.cursor = 'not-allowed';
              }

              gridBody.appendChild(card);
            });

          menuContainer.appendChild(section);
        });
    }

    // Initialize default categories if they don't exist (doesn't delete existing ones!)
    async function initializeDefaultCategories() {
      try {
        const defaultCategories = [
          { id: 'sup', name: 'Sup', sort: 1 },
          { id: 'goreng', name: 'Goreng', sort: 2 },
          { id: 'minuman', name: 'Minuman', sort: 3 }
        ];

        for (const cat of defaultCategories) {
          const catDocRef = doc(db, `restaurants/${restaurantId}/categories`, cat.id);
          const catDoc = await getDoc(catDocRef);

          if (!catDoc.exists()) {
            await setDoc(catDocRef, {
              name: cat.name,
              sort: cat.sort,
              createdAt: serverTimestamp()
            });
          }
        }
      } catch (error) {
        console.error('Error initializing categories:', error);
      }
    }

    // Initialize categories (non-blocking)
    initializeDefaultCategories();

    let currentCats = [];
    let currentItems = [];

    const catsQ  = query(collection(db, `restaurants/${restaurantId}/categories`), orderBy("sort"));
    const itemsQ = query(collection(db, `restaurants/${restaurantId}/menuItems`), orderBy("name"));

    onSnapshot(
      catsQ,
      snap => {
        currentCats = snap.docs.map(d=>({categoryId: d.id, ...d.data()}));
        allCategories = currentCats;
        console.log("📥 categories found:", snap.size, currentCats);
        if (allCategories.length > 0) {
          renderCategoryFilters(allCategories);
          renderFilteredMenu();
        }
      },
      err => {
        console.error("❌ categories onSnapshot error:", err);
        alert("Categories read error: " + err.code);
      }
    );

    onSnapshot(
      itemsQ,
      snap => {
        currentItems = snap.docs.map(d=>({id:d.id, ...d.data()}));
        allMenuItems = currentItems;
        console.log("📥 menuItems docs:", snap.size);
        renderFilteredMenu();
      },
      err => {
        console.error("❌ menuItems onSnapshot error:", err);
        alert("Menu read error: " + err.code);
      }
    );
  });
</script>

  <!-- 🔧 Non-module script: cart + submit (unchanged except exposing addItem globally) -->
  <script>
    // Toggle table section
    function toggleTableSection() {
      const content = document.getElementById('tableSectionContent');
      const toggle = document.querySelector('.section-toggle');
      if (content && toggle) {
        content.classList.toggle('collapsed');
        toggle.classList.toggle('collapsed');
      }
    }
    
    let cart = [];
    let noteTargetName = null;

    // expose addItem for the module script to call
window.addItem = function(name, price) {
  const isBungkusTable = (
    window.selectedTable?.type === "bungkus" ||
    /^B(ungkus)?\s*\d+$/i.test(String(window.selectedTable?.name || ""))
  );

  const existing = cart.find(item => item.name === name && item.isBungkus === isBungkusTable);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      name,
      price,
      qty: 1,
      isBungkus: isBungkusTable,
      note: isBungkusTable ? "bungkus" : ""
    });
  }

  updateDisplay();
};


    function updateDisplay() {
      const list = document.getElementById("orderList");
      const total = document.getElementById("totalPrice");
      const emptyCart = document.getElementById("emptyCart");
      
      list.innerHTML = "";
      let totalPrice = 0;

      if (cart.length === 0) {
        emptyCart.style.display = 'block';
        list.style.display = 'none';
        total.innerText = '0.00';
        return;
      }

      emptyCart.style.display = 'none';
      list.style.display = 'block';

      cart.forEach((item, index) => {
        const unitPrice = item.price + (item.isBungkus ? 0.5 : 0);
        totalPrice += unitPrice * item.qty;

        const noteHtml = item.note ? `<div class="cart-item-note">Note: ${item.note}</div>` : "";

        const li = document.createElement("li");
        li.className = "cart-item";
        li.innerHTML = `
          <div class="cart-item-header">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">RM ${(item.price + (item.isBungkus ? 0.5 : 0)).toFixed(2)}</div>
          </div>
          ${noteHtml}
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
            <div class="qty-display">${item.qty}</div>
            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
          </div>
          <div class="edit-btn-container">
            <button class="edit-btn" onclick="toggleActions(${index})">✏️ Edit</button>
          </div>
          <div class="cart-item-actions" id="actions-${index}">
            <button class="note-btn" onclick="openNote('${item.name}')">📝 Note</button>
            <button class="remove-btn" onclick="removeItem('${item.name}')">🗑️ Remove</button>
          </div>
        `;
        list.appendChild(li);
      });

      total.innerText = totalPrice.toFixed(2);
    }

    function changeQty(index, change) {
      cart[index].qty += change;
      if (cart[index].qty < 1) cart.splice(index, 1);
      updateDisplay();
    }

    function toggleActions(index) {
      const actionsDiv = document.getElementById(`actions-${index}`);
      const allActions = document.querySelectorAll('.cart-item-actions');
      
      // Close all other actions
      allActions.forEach((action, i) => {
        if (action.id !== `actions-${index}`) {
          action.classList.remove('show');
        }
      });
      
      // Toggle current
      actionsDiv.classList.toggle('show');
    }

    function removeItem(name) {
      cart = cart.filter(item => item.name !== name);
      updateDisplay();
    }

    function clearOrder() {
      cart = [];
      updateDisplay();
    }

    // 📝 Notes
    function openNote(name) {
      noteTargetName = name;
      const target = cart.find(it => it.name === name);
      document.getElementById('noteText').value = target?.note || "";
      const modal = new bootstrap.Modal(document.getElementById('noteModal'));
      modal.show();

      document.getElementById('saveNoteBtn').onclick = () => {
        const txt = document.getElementById('noteText').value.trim();
        const it = cart.find(i => i.name === noteTargetName);
        if (it) it.note = txt;
        modal.hide();
        updateDisplay();
      };
    }
   function toggleBungkus(index) {
  cart[index].isBungkus = !cart[index].isBungkus;

  if (cart[index].isBungkus) {
    // append Bungkus note (if not already inside)
    if (!cart[index].note.includes("Bungkus")) {
      cart[index].note = (cart[index].note ? cart[index].note + " · " : "") + "Bungkus";
    }
  } else {
    // remove Bungkus note when un-toggled
    cart[index].note = cart[index].note.replace(/Bungkus/gi, "").replace(/ · $/, "").trim();
  }

  updateDisplay();
}


    function appendQuickNote(txt) {
      const ta = document.getElementById('noteText');
      ta.value = (ta.value ? ta.value + " · " : "") + txt;
    }

async function mergeIntoExisting(activeOrderId, orderData) {
  const db = window.db, rid = window.restaurantId;
  const orderRef = window.doc(db, `restaurants/${rid}/orders`, activeOrderId);

  await window.runTransaction(db, async (tx) => {
    const snap = await tx.get(orderRef);
    if (!snap.exists()) throw new Error("Existing order not found.");

    const existing = snap.data();
    const items = Array.isArray(existing.items) ? [...existing.items] : [];

    // merge: name + unitPrice + note
    for (const ni of orderData.items) {
      const i = items.findIndex(it =>
        it.name === ni.name &&
        Number(it.unitPrice ?? it.price) === Number(ni.unitPrice) &&
        (it.note || "") === (ni.note || "")
      );

// Always push as a new row (don’t merge with existing)
items.push({
  ...ni,
  kds: {},            // reset KDS state for kitchen
  batch: Date.now()   // optional: mark this order batch
});


    }

    // ✅ IMPORTANT: reset section flags + force status back to active
    tx.update(orderRef, {
      items,
      kds: {},                 // clear all done flags
      status: "active",        // reopen if it was completed
      updatedAt: window.serverTimestamp()
    });
  });
}


async function createNewTicket(orderData) {
  const db = window.db, rid = window.restaurantId;

  const newOrderId = await window.runTransaction(db, async (tx) => {
    const counterRef = window.doc(db, `restaurants/${rid}/meta`, "orderCounter");
    const counterSnap = await tx.get(counterRef);
    const current = counterSnap.exists() ? (counterSnap.data().count || 0) : 0;
    const next = current + 1;
    const prettyId = `ORD-${String(next).padStart(5, "0")}`;

    const orderRef = window.doc(db, `restaurants/${rid}/orders`, prettyId);
    const tableRef = window.doc(db, `restaurants/${rid}/tables/${window.selectedTableId}`);

    // increment order counter
    tx.set(counterRef, { count: next }, { merge: true });

    // create the new order
    tx.set(orderRef, {
      ...orderData,
      orderId: prettyId,
      createdAt: window.serverTimestamp(),
      updatedAt: window.serverTimestamp()
    });

    // ✅ keep the table in "ordered" (red) state for ALL new tickets
    tx.update(tableRef, {
      status: "ordered",
      activeOrderId: prettyId, // always update to latest ticket ID
      updatedAt: window.serverTimestamp()
    });

    return prettyId;
  });

  return newOrderId;
}

function inferSectionFromName(name) {
  const n = name.toLowerCase();
  const drinkKW = [
    "teh", "milo", "kopi", "nescafe", "neslo", "sirap", "limau", "joss", "extra joss",
    "air panas", "air suam", "air kosong", "bandung", "horlicks", "coklat", "chocolate",
    "3 layer", "mocha", "drink", "ais", "o ais", "bersusu", "lemon", "tapai"
  ];

  if (n.includes("goreng")) return "goreng";
  if (n.includes("sup")) return "sup";
  if (drinkKW.some(k => n.includes(k))) return "drinks";
  return "sup"; // fallback
}



async function submitOrder() {
  if (!window.selectedTable || !window.selectedTableId || cart.length === 0) {
    alert("Please select a table and add items.");
    return;
  }

  // 1) decide if this is a bungkus slot
  const isBungkus =
    (window.selectedTable?.type === "bungkus") ||
    (/^B(ungkus)?\s*\d+$/i.test(String(window.selectedTable?.name || ""))) ||
    (/^B\d+$/i.test(String(window.selectedTableId || "")));

  // 2) nice label for display (e.g. "B1" or "T12")
  const label =
    window.selectedTableLabel ||
    (isBungkus
      ? (window.selectedTable?.name || String(window.selectedTableId))
      : `T${window.selectedTableNumber}`);

  // 3) payload to store
  const orderData = {
    table: label,
    tableNumber: isBungkus ? null : window.selectedTableNumber,
items: cart.map(i => ({
  name: i.name,
  unitPrice: Number(i.price) + (i.isBungkus ? 0.50 : 0),
  qty: Number(i.qty) || 0,
  note: i.note || (i.isBungkus ? "bungkus" : ""),
  section: inferSectionFromName(i.name) // ✅ include this!
})),

    status: "open",
  };

  const activeOrderId = window.selectedTable.activeOrderId || null;

  try {
    if (activeOrderId) {
      const orderRef = doc(db, `restaurants/${restaurantId}/orders/${activeOrderId}`);
      const orderSnap = await getDoc(orderRef);
      const orderStatus = orderSnap.exists() ? (orderSnap.data().status || "") : "";

      if (["open", "active"].includes(orderStatus)) {
        // ✅ merge into the current active ticket
        await mergeIntoExisting(activeOrderId, orderData);

        alert("Order merged into existing ticket!");
        clearOrder();
        document.querySelectorAll('#tableButtons button').forEach(b => b.classList.remove("active"));
        window.selectedTable = null;
        window.selectedTableId = null;
        window.selectedTableNumber = null;
        document.getElementById("tableNumber").value = "";
        const labelEl = document.getElementById("selectedTableLabel");
        if (labelEl) labelEl.innerText = "";
        updateDisplay();
        return; // ✅ STOP here after merging
      } else {
        // 🔴 old ticket was completed/cancelled → create new ticket
        const newId = await createNewTicket(orderData);
        alert("New order created: " + newId);
      }
    } else {
      // first ticket for this table → create and set activeOrderId on the table
      const rid = window.restaurantId, db = window.db;
      await window.runTransaction(db, async (tx) => {
        const counterRef = window.doc(db, `restaurants/${rid}/meta`, "orderCounter");
        const counterSnap = await tx.get(counterRef);
        const current = counterSnap.exists() ? (counterSnap.data().count || 0) : 0;
        const next = current + 1;
        const prettyId = `ORD-${String(next).padStart(5, "0")}`;

        const orderRef = window.doc(db, `restaurants/${rid}/orders`, prettyId);
        const tableRef = window.doc(db, `restaurants/${rid}/tables/${window.selectedTableId}`);

        tx.set(counterRef, { count: next }, { merge: true });
        tx.set(orderRef, {
          ...orderData,
          orderId: prettyId,
          createdAt: window.serverTimestamp(),
          updatedAt: window.serverTimestamp()
        });
        tx.update(tableRef, {
          status: "ordered",
          activeOrderId: prettyId,
          updatedAt: window.serverTimestamp()
        });
      });
      alert("Order sent successfully!");
    }

    // cleanup after success
    clearOrder();
    document.querySelectorAll('#tableButtons button').forEach(b => b.classList.remove("active"));
    window.selectedTable = null;
    window.selectedTableId = null;
    window.selectedTableNumber = null;
    document.getElementById("tableNumber").value = "";
    const labelEl = document.getElementById("selectedTableLabel");
    if (labelEl) labelEl.innerText = "";
  } catch (e) {
    console.error("[SUBMIT ORDER FAILED]", e);
    alert("Failed to send order: " + (e.message || e.code));
  }
}

    updateDisplay();    

</script>
